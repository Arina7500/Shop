services:
  postgres:
    image: postgres:15-alpine
    container_name: tea-shop-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tea_shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./backend/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - tea-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tea-shop-backend
    command: npm start
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tea_shop
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tea-network

  frontend:
    build: ./frontend
    container_name: tea-shop-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tea-network

volumes:
  postgres_data:

networks:
  tea-network:
    driver: bridge